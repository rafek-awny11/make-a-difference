<section class="bg-gray-300 p-8 min-h-svh" >
<div class="grid grid-cols-6 gap-4 items-center">

    <div class="order-1 col-span-6 md:col-span-1 text-center rounded-2xl colo1 ">
        <h2 class="text-lg font-bold md:text-2xl">ALL Meeting</h2>

    </div>
    <!-- search -->
    <div class="col-span-6 md:col-span-2 md:col-end-7 order-2 md:order-2">
      <form class="max-w-sm mx-auto">
        <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only"
          >Search Meeting</label
        >
        <div class="relative">
          <input
            [(ngModel)]="text"
            type="search"
            name="search"
            class="block w-full md:w-2xs ps-4 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body"
            placeholder="Search Meeting...."
          />
        </div>
      </form>
    </div>

    <!-- button -->
     <div class="order-3 md:order-1 col-span-6 md:col-span-5 flex justify-end">
      <button
       [routerLink]="['/create-meeting']"
        class="btn btn1 md:w-32"
      >
        Create Event
      </button>
    </div>


      <!--table-->
    <div class="order-2 md:order-2 col-span-6 md:col-start-1 md:col-end-7">
      <div
        class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default"
      >
        <table  class="w-full text-sm text-left rtl:text-right text-body z-50">
          <thead
            class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium"
          >
            <tr class="z-50">
              <th scope="col" class="px-6 py-3 font-medium">Event Name</th>
              <th scope="col" class="px-6 py-3 font-medium">Name</th>
              <th scope="col" class="px-6 py-3 font-medium">time</th>
              <th scope="col" class="px-6 py-3 font-medium">Details</th>
              <th scope="col" class="px-6 py-3 font-medium">Delete</th>
            </tr>
          </thead>

          <tbody>
            @for (meeting of allmeeting | search: text ; track meeting.id) {
            <tr class="bg-neutral-primary-soft border-b border-default">
              <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                {{ meeting.eventName }}
              </th>
              <td class="px-6 py-4 font-sans">
                {{ meeting.name}}
              </td>
              <td class="px-6 py-4  font-sans">
                {{ meeting.meetingTime }}
              </td>

              <td class="px-6 py-4">
                <div [routerLink]="['/details-meeting',meeting.name , meeting.id]" class="font-medium cursor-pointer text-fg-brand hover:underline">Edit</div>
              </td>
              <td (click)="removeData(meeting.id)" class="px-6 py-4">
                <i class="fa-solid fa-trash hover:text-red-700 cursor-pointer"></i>
              </td>
            </tr>
            }
          </tbody>
        </table>
      </div>
    </div>


</div>
</section>
