<!--available-->
           <form (ngSubmit)="submitStudent($event) ">
             <div  class="bg-white  shadow rounded-lg flex flex-col h-[500px] md:h[200px]">
                <div class="p-4 flex-1 overflow-auto">
                    <h2 class="text-lg font-semibold mb-2 text-center">Available Student</h2> 
                    <div class="flex justify-between mb-2">
                        <div>
                             <label>
                              <select [(ngModel)]="availableEntries" name="entries" class="border rounded px-6 py-1">
                                  <option *ngFor="let e of [5,10,15,20]">{{e}}</option>
                             </select> entries
                             </label>
                        </div>
                         <div>
                              <input type="text" placeholder="Search..." name="search" [(ngModel)]="availableSearch" class="border border-gray-400 rounded  px-2 py-1">
                         </div>

                    </div>

                    <div class="order-2 md:order-2 col-span-6 md:col-start-1 md:col-end-7">
                <div
        class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
        <table class="w-full text-sm text-left rtl:text-right text-body">
          <thead
            class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium"
          >
            <tr>
              <th scope="col" class="px-6 py-3 font-medium">Student Name</th>
              <th scope="col" class="px-6 py-3 font-medium">Phone</th>
              <th scope="col" class="px-6 py-3 font-medium">Select</th>
           
            </tr>
          </thead>
         
          <tbody>
           
            
            <tr   *ngFor="let student of studentList | search:availableSearch"
            class="bg-neutral-primary-soft border-b border-default">
              <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                {{ student.name }}
              </th>
              <td class="px-6 py-4 font-medium">
                {{ student.phoneNo }}
              </td>
              <td class="px-6 py-4 font-medium">
                <div class="flex items-center">
             <input    
 [(ngModel)]="student.selected"  name="selected-{{student.id}}" type="checkbox" value="" class="w-4 h-4 border border-default-medium rounded-xs bg-neutral-secondary-medium focus:ring-2 focus:ring-brand-soft">
             </div>
              </td>
           
             
             
            </tr>
          
          </tbody>

          
        </table>
        
      </div>
       
                    
                </div>
                 <div class="col-span-6 mt-8 md:col-span-5 flex justify-center ">
      <button 
      
        class="btn btn1 md:w-32"
      >
        Add To Event 
      </button>
    </div>
                
    </div>
   

                
  </div>
           </form>
